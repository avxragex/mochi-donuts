<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi Donuts - Browse</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>

<body class="browse-body">
    <!-- Top Navbar (Desktop) -->
    <header class="navbar">
        <div class="logo">
            <img src="images/logo.png" alt="mochi donuts logo">
        </div>

        <nav class="top-nav">
            <a href="index.html" class="nav-link">
                <span class="nav-icon">
                    <span class="material-symbols-rounded">home</span>
                </span>
            </a>
            <a href="browse.html" class="nav-link active">
                <span class="nav-icon">
                    <span class="material-symbols-rounded">menu</span>
                </span>
                <span class="nav-label">Browse</span>
            </a>
            <a href="cart.html" class="nav-link">
                <span class="nav-icon">
                    <span class="material-symbols-rounded">shopping_bag</span>
                </span>
            </a>
        </nav>
    </header>

    <!-- Page Content -->
    <main class="browse-page">
        <!-- Search + Filter -->
        <search>
            <input type="text" id="search-input" placeholder="Search">
            <button class="btn-filter" aria-label="Filter">
                <span class="material-symbols-rounded">tune</span>
            </button>
        </search>

        <!-- Category list -->
        <nav class="category-tabs" aria-label="Categories">
            <button class="category-tab active">Popular</button>
            <button class="category-tab">New</button>
            <button class="category-tab">Best Sellers</button>
            <button class="category-tab">Limited Time</button>
            <button class="category-tab">Staff Picks</button>
        </nav>

        <!-- Product grid -->
        <section class="product-grid">
        </section>
    </main>

    <!-- Bottom Navbar (Mobile) -->
    <nav class="bottom-nav"></nav>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
