<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi Donuts</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>

<body>
    <!-- Top Navbar (Desktop) -->
    <header class="navbar">
        <div class="logo">
            <img src="images/logo.png" alt="mochi donuts logo">
        </div>

        <nav class="top-nav">
            <a href="index.html" class="nav-link active">
                <span class="nav-icon">
                    <span class="material-symbols-rounded">home</span>
                </span>
                <span class="nav-label">Home</span>
            </a>
            <a href="browse.html" class="nav-link">
                <span class="nav-icon">
                    <span class="material-symbols-rounded">menu</span>
                </span>
            </a>
            <a href="cart.html" class="nav-link">
                <span class="nav-icon">
                    <span class="material-symbols-rounded">shopping_bag</span>
                </span>
            </a>
        </nav>
    </header>

    <!-- Page Content -->
    <main class="home-page">
        <!-- Hero Section -->
        <section class="hero">
            <h1 class="hero-text">"Made with love, <br>one donut at a time"</h1>
            <figure class="hero-image">
                <img src="images/biscoff.png" alt="Biscoff caramel donut">
            </figure>
        </section>

        <!-- Featured Section -->
        <section class="featured">
            <!-- Browse button -->
            <a href="browse.html" class="btn-browse">Browse</a>

            <!-- Featured donuts -->
            <h2>Featured</h2>
            <div class="featured-grid">
                <article class="donut-card">
                    <figure>
                        <img src="images/strawberry.png" alt="Strawberry vanilla donut">
                    </figure>
                    <h3>Strawberry Vanilla</h3>
                    <p>$4.50</p>
                </article>

                <article class="donut-card">
                    <figure>
                        <img src="images/pistachio.png" alt="Pistachio donut">
                    </figure>
                    <h3>Pistachio</h3>
                    <p>$4.50</p>
                </article>

                <article class="donut-card">
                    <figure>
                        <img src="images/original-glaze.png" alt="Original Glaze donut">
                    </figure>
                    <h3>Original Glaze</h3>
                    <p>$4.50</p>
                </article>

                <article class="donut-card">
                    <figure>
                        <img src="images/tea.png" alt="Tea donut">
                    </figure>
                    <h3>Tea</h3>
                    <p>$4.50</p>
                </article>
            </div>
        </section>
    </main>

    <!-- Bottom Navbar (Mobile) -->
    <nav class="bottom-nav">
            <a href="#" class="nav-link">Home</a>
            <a href="browse.html" class="nav-link">Browse</a>
            <a href="cart.html" class="nav-link">Cart</a>
    </nav>

    <script src="js/main.js"></script>
</body>
</html>
